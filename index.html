<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Data Audio Engine</title>
<style>
body { background:black; color:white; font-family:monospace; text-align:center; }
button, input { margin:5px; }
</style>
</head>
<body>

<h2>AudioWorklet Data Engine</h2>

<button onclick="init()">Init</button>
<button onclick="start()">Start</button>
<button onclick="stop()">Stop</button>
<button onclick="startMic()">Mic Input</button>

<br>
<input type="file" id="fileInput">

<script>
let ctx, node;

async function init() {
  ctx = new AudioContext();
  await ctx.audioWorklet.addModule("processor.js");

  node = new AudioWorkletNode(ctx, "data-processor", {
    outputChannelCount: [2]
  });

  node.connect(ctx.destination);

  // 🔑 REQUIRED for sound
  await ctx.resume();

  console.log("Audio initialized");
}

function start() {
  node.port.postMessage({ type: "start" });
}

function stop() {
  node.port.postMessage({ type: "stop" });
}

// FILE INPUT
document.getElementById("fileInput").addEventListener("change", e => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = () => {
    let data;

    if (file.type.includes("text")) {
      data = reader.result.split(/[\s,]+/)
        .map(Number)
        .filter(n => !isNaN(n));
    } else {
      data = Array.from(new Uint8Array(reader.result));
    }

    node.port.postMessage({ type: "data", data });
    console.log("Data loaded:", data.length);
  };

  if (file.type.includes("text")) reader.readAsText(file);
  else reader.readAsArrayBuffer(file);
});

// 🎤 MIC INPUT (this actually drives sound)
async function startMic() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const src = ctx.createMediaStreamSource(stream);
  const analyser = ctx.createAnalyser();

  analyser.fftSize = 256;
  src.connect(analyser);

  const buffer = new Uint8Array(analyser.frequencyBinCount);

  setInterval(() => {
    analyser.getByteFrequencyData(buffer);
    node.port.postMessage({
      type: "data",
      data: Array.from(buffer)
    });
  }, 50);
}
</script>

</body>
</html>
